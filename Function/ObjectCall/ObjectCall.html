<!DOCTYPE html>
<html>
    <head>
        <title>Object Call</title>
        <script src="ObjectCall.js" defer></script>
    </head>
    <body>
    <h1>Bag Details</h1>
    <label for="lblBrand">Brand:</label>
    <input id="txtBrand" type="text" placeholder="Enter your  Brand Bag Name"><br>
    <label for="lblcolour">Colour of the Bag:</label>
    <input id="txtColour" type="text" placeholder="Enter your Bag Colour"><br>
    <label for="lbLDS">Design and Style:</label>
    <input id="txtDS" type="text" placeholder="Enter Design and Style of the Bag"><br>
    <label for="lblModel">Model:</label>
    <input id="txtModel" type="text" placeholder="Enter the Model of the Bag"><br>
    <label for="lblManufactureDate">Manufacture Time:</label>
    <input id="txtManufctureDate" type="number" placeholder="Enter the Specific date of Manufactured"><br>
    <label for="lblCapacity">Capacity of the Bag:</label>
    <input id="txtCapacity" type="text" placeholder="Enter the Capacity of the bag in Litres"><br>
    <button id="btnBagDetails" onclick="onClickBagDetails()">Bag Details</button>
    <div id="divResult"></div>
    </body>
</html>
