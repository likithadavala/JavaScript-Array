<!DOCTYPE html>
<html>
<head>
    <title>Splice in Arrays</title>
    <script src="Splice.js" defer></script>
</head>
<body>
    <h1>Splice in Arrays</h1>
    <label for="lblFabric">Enter your Fabric Name:</label>
    <input id="txtFabric" type="text" placeholder="Enter your Fabric Name">
    <button id="btnPush" onclick="onClickPushArray()"> Push</button>
    <div id="divPush"></div>
    <label for="lblStartIndex">Start Index:</label>
    <input id="txtStartIndex" type="number" placeholder="Enter an Number">
    <label for="lblEndIndex">End Index:</label>
    <input id="txtEndIndex" type="number" placeholder="Enter an Number">
    <button id="btnSplice" onclick="onClickSpliceArray()"> Splice</button>
    <div id="divSplice"></div>
</body>
</html>
